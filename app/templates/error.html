{% extends "base.html" %}

{% block title %}{{ status_code }} Error — ThermoTox{% endblock %}

{% block main %}
<div class="error-container">
  <div class="error-content">
    <h1 class="error-code">{{ status_code }}</h1>
    <h2 class="error-title">{{ error_message }}</h2>
    <p class="error-description">{{ error_description }}</p>
    <a href="/" class="error-btn">Return to Home</a>
  </div>
</div>

<style>
  .error-container {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 70vh;
    padding: 2rem;
  }

  .error-content {
    text-align: center;
    max-width: 500px;
  }

  .error-code {
    font-size: 5rem;
    font-weight: bold;
    color: #d33;
    margin: 0 0 1rem 0;
    line-height: 1;
  }

  .error-title {
    font-size: 1.8rem;
    color: #333;
    margin: 0 0 1rem 0;
  }

  .error-description {
    font-size: 1rem;
    color: #666;
    margin: 0 0 2rem 0;
    line-height: 1.6;
  }

  .error-btn {
    display: inline-block;
    padding: 0.75rem 1.5rem;
    background-color: #0066cc;
    color: white;
    text-decoration: none;
    border-radius: 4px;
    font-weight: 600;
    transition: background-color 0.3s ease;
  }

  .error-btn:hover {
    background-color: #0052a3;
  }
</style>
{% endblock %}
