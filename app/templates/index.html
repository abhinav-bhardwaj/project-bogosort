{% extends "base.html" %}

{% block title %}Toxicity ML Wiki{% endblock %}

{% block head %}
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
{% endblock %}

{% block main %}
<main class="page-container">
  <div class="page">

    <section class="card form-card">
      <form id="articleForm" class="form-grid">
        <div class="field full">
          <label for="articleUrl">Wikipedia URL</label>
          <input id="articleUrl" type="url" placeholder="https://en.wikipedia.org/wiki/Hertie_School" />
        </div>
        <div id="articleInputs" class="field full"></div>

        <div class="field">
          <label for="limit">Comments</label>
          <input id="limit" type="number" value="30" min="1" />
        </div>

        <div class="field">
          <label for="autoThreshold">Auto‑ban <strong id="autoThresholdValue">0.75</strong></label>
          <input id="autoThreshold" type="range" min="0" max="1" step="0.01" value="0.75" />
        </div>

        <div class="field">
          <label for="manualThreshold">Manual <strong id="manualThresholdValue">0.55</strong></label>
          <input id="manualThreshold" type="range" min="0" max="1" step="0.01" value="0.55" />
        </div>

        <div class="field">
          <label for="modelSelect">Model</label>
          <select id="modelSelect"></select>
        </div>

        <div class="actions full">
          <button id="addInput" type="button" class="btn secondary">Add more</button>
          <button type="submit" class="btn primary">Analyze Comments</button>
        </div>
        <div class="field full" id="ingestStatus" aria-live="polite"></div>
      </form>
    </section>

    <section class="section-title">
      <h2>Additive Toxicity Trend by Article</h2>
      <p class="muted">Threshold for flags: <span id="thresholdLabel">0.55</span></p>
    </section>

    <section id="articlesGrid" class="article-grid"></section>
  </div>
</main>
{% endblock %}

{% block scripts %}
  <script src="/static/js/article.js"></script>
{% endblock %}
