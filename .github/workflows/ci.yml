name: CI

on:
  push:
    branches:
      - dev
      - app-feature/third-iteration
  pull_request:
    branches:
      - dev
      - app-feature/third-iteration

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        run: uv python install 3.10

      - name: Install dependencies
        run: uv sync --frozen

      - name: Run tests
        run: uv run pytest app/tests/ -v

  deploy:
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/dev'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Push to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_NAME: ${{ secrets.HF_NAME }}
        run: |
          git push --force \
            "https://${HF_NAME}:${HF_TOKEN}@huggingface.co/spaces/${HF_NAME}/Wikipedia-Toxic-Comment-Classifier" \
            HEAD:main
